  "@typescript-eslint/utils": 8.62.1
  semver@6: 7.8.5

patchedDependencies:
  eslint-config-flat-gitignore: patches/eslint-config-flat-gitignore.patch
  eslint-plugin-yml: patches/eslint-plugin-yml.patch

